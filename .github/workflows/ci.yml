name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx prisma generate

      - run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx prisma generate

      - run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      MOBIMATTER_MERCHANT_ID: "test_merchant_id"
      MOBIMATTER_API_KEY: "test_api_key"
      JWT_SECRET: "test_jwt_secret_not_for_production"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_test_ci_placeholder"
      NEXT_PUBLIC_BASE_URL: "https://mobialo.eu"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx prisma generate

      - run: bun run test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      MOBIMATTER_MERCHANT_ID: "ci-placeholder"
      MOBIMATTER_API_KEY: "ci-placeholder"
      JWT_SECRET: "ci-secret-not-for-production"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      NEXT_PUBLIC_BASE_URL: "https://mobialo.eu"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx prisma generate

      - run: bun run build

      - name: Check build output
        run: test -d .next

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [build]
    env:
      CI: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      E2E_PORT: "3100"
      MOBIMATTER_MERCHANT_ID: "ci-placeholder"
      MOBIMATTER_API_KEY: "ci-placeholder"
      JWT_SECRET: "ci-secret-not-for-production-ci-only-32chars"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3100"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx prisma generate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests (chromium only)
        run: bunx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
